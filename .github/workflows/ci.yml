name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src/bricks
      - run: lint-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: python -c "import bricks; print('engine import OK,', bricks.__version__)"
      - run: python -c "import sys, bricks; leaked = [m for m in sys.modules if m.startswith('bricks_ai') or m in ('litellm', 'anthropic', 'openai')]; assert not leaked, leaked"
      - run: bricks --help
      - run: pytest
